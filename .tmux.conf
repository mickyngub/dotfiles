set -g default-terminal "screen-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 8
bind -r k resize-pane -U 8
bind -r l resize-pane -R 8
bind -r h resize-pane -L 8

bind -r H resize-pane -x 80
bind -r L resize-pane -x 20

bind -r m resize-pane -Z \; run-shell "~/dotfiles/tmux-zoom-indicator.sh"

set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on


set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'

set -g @themepack 'powerline/default/yellow'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Per-session status-bar color (runs after themepack so it wins)
set-hook -g session-created 'run-shell "~/dotfiles/tmux-session-color.sh #{session_name}"'
set-hook -g client-session-changed 'run-shell "~/dotfiles/tmux-session-color.sh #{session_name} ; ~/dotfiles/tmux-zoom-indicator.sh"'
run-shell "~/dotfiles/tmux-session-color.sh"

# Zoom focus indicator: top label + bright status bar + terminal bg tint (OSC 11)
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-format "#{?window_zoomed_flag,#[fg=yellow#,bold#,reverse] ▼ ZOOM ▼ ,}"
set -g pane-active-border-style "fg=yellow,bold"
set -ag status-style ",#{?window_zoomed_flag,bg=yellow fg=black bold,}"

# Re-sync terminal bg tint when active window changes (catches leaving a zoomed window)
set-hook -g window-pane-changed 'run-shell "~/dotfiles/tmux-zoom-indicator.sh"'
